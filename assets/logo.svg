<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Body -->
  <rect x="28" y="52" width="44" height="36" rx="8" fill="#8B5E3C" stroke="#5C3D1E" stroke-width="2"/>
  <!-- Chest gear circle -->
  <circle cx="50" cy="68" r="10" fill="#6B4226" stroke="#3E2009" stroke-width="1.5"/>
  <circle cx="50" cy="68" r="6" fill="#5C3317" stroke="#3E2009" stroke-width="1"/>
  <!-- Head -->
  <ellipse cx="50" cy="34" rx="22" ry="20" fill="#9C6B3C" stroke="#5C3D1E" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="42" cy="32" r="7" fill="#3D2B1A" stroke="#1A0F00" stroke-width="1.5"/>
  <circle cx="58" cy="32" r="7" fill="#3D2B1A" stroke="#1A0F00" stroke-width="1.5"/>
  <circle cx="43" cy="31" r="4" fill="#C0C0C0"/>
  <circle cx="59" cy="31" r="4" fill="#C0C0C0"/>
  <circle cx="44" cy="30" r="2" fill="white" opacity="0.6"/>
  <circle cx="60" cy="30" r="2" fill="white" opacity="0.6"/>
  <!-- Mouth -->
  <circle cx="50" cy="42" r="2" fill="#2C1500"/>
  <!-- Antennae -->
  <line x1="45" y1="14" x2="43" y2="8" stroke="#6B4226" stroke-width="2" stroke-linecap="round"/>
  <circle cx="43" cy="7" r="2" fill="#B8860B"/>
  <line x1="55" y1="14" x2="57" y2="8" stroke="#6B4226" stroke-width="2" stroke-linecap="round"/>
  <circle cx="57" cy="7" r="2" fill="#B8860B"/>
  <!-- Left arm (waving) -->
  <rect x="10" y="54" width="16" height="10" rx="5" fill="#7A4F2E" stroke="#5C3D1E" stroke-width="1.5" transform="rotate(-30 18 59)"/>
  <!-- Right arm -->
  <rect x="74" y="54" width="16" height="10" rx="5" fill="#7A4F2E" stroke="#5C3D1E" stroke-width="1.5" transform="rotate(15 82 59)"/>
  <!-- Legs -->
  <rect x="33" y="85" width="13" height="12" rx="4" fill="#7A4F2E" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="54" y="85" width="13" height="12" rx="4" fill="#7A4F2E" stroke="#5C3D1E" stroke-width="1.5"/>
  <!-- Rust spots -->
  <circle cx="36" cy="60" r="2" fill="#6B3A1F" opacity="0.5"/>
  <circle cx="62" cy="72" r="1.5" fill="#6B3A1F" opacity="0.5"/>
  <circle cx="40" cy="75" r="1" fill="#6B3A1F" opacity="0.5"/>
</svg>
